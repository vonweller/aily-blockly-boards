        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          source: "temp_images/*"
          target: "${{ secrets.IMG_TARGET }}"
          strip_components: 1
          rm: false
          timeout: 180s
          command_timeout: 15m

      - name: 等待后重试SCP上传 (尝试 3/3)
        if: steps.check-update-all-img.outputs.should_run == 'true' && steps.upload_all_img_try_1.outcome == 'failure' && steps.upload_all_img_try_2.outcome == 'failure'
