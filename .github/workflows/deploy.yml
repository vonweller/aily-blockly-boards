  upload-all-img:
    runs-on: ubuntu-latest
    steps:
      - name: Check UPDATE_ALL_IMG flag
        id: check-update-all-img
        run: |
          if [[ "${{ secrets.UPDATE_ALL_IMG }}" == "true" ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout code
        if: steps.check-update-all-img.outputs.should_run == 'true'
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GHB_TOKEN }}
      
      - name: upload all img
        if: steps.check-update-all-img.outputs.should_run == 'true'
        id: find_images
        run: |
          echo "找到以下WebP图片文件："
          find . -type f -name "*.webp" -not -path "*/node_modules/*" -not -path "*/\.*/*"
          
          # 创建临时目录用于整理图片
          mkdir -p ./temp_images
          
          # 遍历所有WebP图片并保持相对路径结构复制到临时目录
          find . -type f -name "*.webp" -not -path "*/node_modules/*" -not -path "*/\.*/*" | while read file; do
            # 保持相对路径结构，包括父目录
            relative_path="${file#./}"
            target_dir="./temp_images/$(dirname "$relative_path")"
            mkdir -p "$target_dir"
            cp "$file" "$target_dir/"
            echo "复制 $file 到 $target_dir/$(basename "$file")"
          done

          # 检查是否有找到图片
          if [ -z "$(find ./temp_images -name "*.webp" 2>/dev/null)" ]; then
            echo "没有找到任何WebP图片"
            exit 0
          fi
      
      - name: 使用SCP上传WebP图片 (尝试 1/3)
        id: upload_all_img_try_1
        if: steps.check-update-all-img.outputs.should_run == 'true'
        continue-on-error: true
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          source: "temp_images/*"
          target: "${{ secrets.IMG_TARGET }}"
          strip_components: 1
          rm: false
          timeout: 180s
          command_timeout: 15m

      - name: 等待后重试SCP上传 (尝试 2/3)
        if: steps.check-update-all-img.outputs.should_run == 'true' && steps.upload_all_img_try_1.outcome == 'failure'
        run: sleep 10

      - name: 使用SCP上传WebP图片 (尝试 2/3)
