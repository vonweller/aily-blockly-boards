name: Check and Deploy to NPM

on:
  push:
    branches: 
      - deploy

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed packages
        id: set-matrix
        run: |
          # 获取最后一次成功运行的提交SHA或默认为一个空树
          git fetch origin tag last-deploy --force 2>/dev/null || true
          if git rev-parse -q --verify refs/tags/last-deploy >/dev/null; then
            BASE_SHA=$(git rev-parse refs/tags/last-deploy)
            echo "Using last successful deploy tag as base: $BASE_SHA"
          else
            echo "No last-deploy tag found, using first commit in history"
            BASE_SHA=$(git rev-list --max-parents=0 HEAD)
          fi
          
          HEAD_SHA=${{ github.sha }}
          
          echo "Comparing $BASE_SHA...$HEAD_SHA"

          CHANGED_FILES=$(git diff --name-only --diff-filter=ACMRT "$BASE_SHA" "$HEAD_SHA")

          mapfile -t CHANGED_PACKAGES < <(
            printf '%s\n' "$CHANGED_FILES" |
            awk -F/ 'NF > 1 { print $1 }' |
            while read -r dir; do
              if [ -f "$dir/package.json" ] || printf '%s\n' "$CHANGED_FILES" | awk -v dir="$dir" 'index($0, dir "/") == 1 && /\.webp$/ { found=1 } END { exit !found }'; then
                printf '%s\n' "$dir"
              fi
            done |
            sort -u
          )

          if [ ${#CHANGED_PACKAGES[@]} -gt 0 ]; then
            echo "Detected changed packages: ${CHANGED_PACKAGES[*]}"
          fi
          
          if [ ${#CHANGED_PACKAGES[@]} -eq 0 ]; then
            echo "matrix={\"package\":[]}" >> $GITHUB_OUTPUT
            echo "No packages changed"
          else
            JSON_ARRAY=$(printf '"%s",' "${CHANGED_PACKAGES[@]}" | sed 's/,$//')
            echo "matrix={\"package\":[$JSON_ARRAY]}" >> $GITHUB_OUTPUT
            echo "Changed packages: ${CHANGED_PACKAGES[@]}"
          fi

  build-and-publish:
    needs: detect-changes
    if: ${{ github.event_name == 'push' && needs.detect-changes.outputs.matrix != '{"package":[]}' && github.ref == 'refs/heads/deploy' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      NPM_CONFIG_FETCH_RETRIES: 5
      NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: 10000
      NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: 120000
      NPM_CONFIG_FETCH_TIMEOUT: 300000
    strategy:
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Check UPDATE_ALL flag
        id: check-update-all
        run: |
          if [[ "${{ secrets.UPDATE_ALL }}" == "true" ]]; then
            echo "should_skip=true" >> $GITHUB_OUTPUT
          else
            echo "should_skip=false" >> $GITHUB_OUTPUT
          fi

      - name: echo matrix
        if: steps.check-update-all.outputs.should_skip != 'true'
        run: echo "${{ toJson(matrix) }}"

      - name: Checkout code
        if: steps.check-update-all.outputs.should_skip != 'true'
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GHB_TOKEN }}
      
      - name: Setup Node.js
        if: steps.check-update-all.outputs.should_skip != 'true'
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          registry-url: ${{ secrets.REGISTRY_URL }}
      
      # - name: Install dependencies
      #   run: |
      #     cd ${{ matrix.package }}
      #     npm ci || npm install
      
      - name: Check package.json exists
        id: check-pkg
        if: steps.check-update-all.outputs.should_skip != 'true'
        run: |
          if [ -f "${{ matrix.package }}/package.json" ]; then
            echo "has_package=true" >> $GITHUB_OUTPUT
          else
            echo "No package.json in ${{ matrix.package }}, skipping npm steps"
            echo "has_package=false" >> $GITHUB_OUTPUT
          fi

      - name: Build package
        if: steps.check-update-all.outputs.should_skip != 'true' && steps.check-pkg.outputs.has_package == 'true'
        run: |
          cd ${{ matrix.package }}
          npm run build --if-present
      
      - name: Publish to Registry 2
        if: steps.check-update-all.outputs.should_skip != 'true' && steps.check-pkg.outputs.has_package == 'true'
        env:
          REGISTRY_2: ${{ secrets.REGISTRY_URL_2 }}
          TOKEN_2: ${{ secrets.NPM_TOKEN_2 }}
        run: |
          retry_with_backoff() {
            local max_attempts="$1"
            local sleep_seconds="$2"
            shift 2
            local attempt=1

            until "$@"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "Command failed after ${max_attempts} attempts: $*"
                return 1
              fi
              echo "Attempt ${attempt}/${max_attempts} failed. Retrying in ${sleep_seconds}s: $*"
              sleep "$sleep_seconds"
              attempt=$((attempt + 1))
              sleep_seconds=$((sleep_seconds * 2))
            done
          }

          if [ -z "$REGISTRY_2" ] || [ -z "$TOKEN_2" ]; then
            echo "Registry 2 secrets not set, skipping."
            exit 0
          fi

          cd ${{ matrix.package }}
          trap 'rm -f .npmrc' EXIT
          
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          echo "Current version: $CURRENT_VERSION"

          echo "----------------------------------------"
          echo "Processing second registry: $REGISTRY_2"
          
          # 去掉协议头获取 host
          REGISTRY_2_NO_PROTO=$(echo "$REGISTRY_2" | sed 's/^https\?:\/\///')
          # 去掉可能存在的尾部斜杠
          REGISTRY_2_NO_PROTO=$(echo "$REGISTRY_2_NO_PROTO" | sed 's/\/$//')
          
          # 在当前目录生成 .npmrc，确保优先级最高且配置准确
          echo "registry=$REGISTRY_2" > .npmrc
          echo "//$REGISTRY_2_NO_PROTO/:_authToken=$TOKEN_2" >> .npmrc
          
          # 检查是否存在
          if npm view $PACKAGE_NAME@$CURRENT_VERSION version &> /dev/null; then
             echo "Version $CURRENT_VERSION exists on $REGISTRY_2, unpublishing..."
             retry_with_backoff 3 3 npm unpublish $PACKAGE_NAME@$CURRENT_VERSION --force
             sleep 5
          fi
          
          # 发布
           retry_with_backoff 5 5 npm publish --access public

      - name: Notify cache bump for Registry 2
        if: steps.check-update-all.outputs.should_skip != 'true' && steps.check-pkg.outputs.has_package == 'true'
        env:
          NOTIFY_URL: ${{ secrets.NOTIFY_URL_2 }}
          NOTIFY_TOKEN: ${{ secrets.NOTIFY_TOKEN_2 }}
        run: |
          if [ -z "$NOTIFY_URL" ] || [ -z "$NOTIFY_TOKEN" ]; then
            echo "NOTIFY_URL_2 or NOTIFY_TOKEN_2 not set, skipping."
            exit 0
          fi
          echo "Sending POST request to $NOTIFY_URL"
          set +e
          HTTP_STATUS=$(curl -s -o /tmp/notify_response_2.txt -w "%{http_code}" --max-time 30 \
            -X POST "$NOTIFY_URL" \
            -H "Authorization: Bearer $NOTIFY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{}')
          CURL_EXIT=$?
          set -e
          if [ "$CURL_EXIT" -ne 0 ]; then
            echo "::warning::Notification (Registry 2) request failed (curl exit code $CURL_EXIT)"
          elif [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "Notification (Registry 2) sent successfully (HTTP $HTTP_STATUS)"
          else
            echo "::warning::Notification (Registry 2) failed with HTTP status $HTTP_STATUS"
            cat /tmp/notify_response_2.txt || true
          fi

      - name: Publish to Default Registry
        if: steps.check-update-all.outputs.should_skip != 'true' && steps.check-pkg.outputs.has_package == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          retry_with_backoff() {
            local max_attempts="$1"
            local sleep_seconds="$2"
            shift 2
            local attempt=1

            until "$@"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "Command failed after ${max_attempts} attempts: $*"
                return 1
              fi
              echo "Attempt ${attempt}/${max_attempts} failed. Retrying in ${sleep_seconds}s: $*"
              sleep "$sleep_seconds"
              attempt=$((attempt + 1))
              sleep_seconds=$((sleep_seconds * 2))
            done
          }

          cd ${{ matrix.package }}
          # 确保清理掉可能残留的 .npmrc
          rm -f .npmrc
          
          # 获取当前版本号
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          echo "Current version: $CURRENT_VERSION"
          
          # 检查当前版本是否已在 NPM registry 上发布 (默认仓库)
          if npm view $PACKAGE_NAME@$CURRENT_VERSION version &> /dev/null; then
            echo "版本 $CURRENT_VERSION 已存在，尝试取消发布..."
            retry_with_backoff 3 3 npm unpublish $PACKAGE_NAME@$CURRENT_VERSION --force
            sleep 5
          fi
          
          # 发布
          retry_with_backoff 5 5 npm publish --access public

      - name: Notify cache bump
        if: steps.check-update-all.outputs.should_skip != 'true' && steps.check-pkg.outputs.has_package == 'true'
        env:
          NOTIFY_URL: ${{ secrets.NOTIFY_URL }}
          NOTIFY_TOKEN: ${{ secrets.NOTIFY_TOKEN }}
        run: |
          if [ -z "$NOTIFY_URL" ] || [ -z "$NOTIFY_TOKEN" ]; then
            echo "NOTIFY_URL or NOTIFY_TOKEN not set, skipping."
            exit 0
          fi
          echo "Sending POST request to $NOTIFY_URL"
          set +e
          HTTP_STATUS=$(curl -s -o /tmp/notify_response.txt -w "%{http_code}" --max-time 30 \
            -X POST "$NOTIFY_URL" \
            -H "Authorization: Bearer $NOTIFY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{}')
          CURL_EXIT=$?
          set -e
          if [ "$CURL_EXIT" -ne 0 ]; then
            echo "::warning::Notification request failed (curl exit code $CURL_EXIT)"
          elif [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "Notification sent successfully (HTTP $HTTP_STATUS)"
          else
            echo "::warning::Notification failed with HTTP status $HTTP_STATUS"
            cat /tmp/notify_response.txt || true
          fi
  
  build-and-publish-all:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/deploy' }}
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      NPM_CONFIG_FETCH_RETRIES: 5
      NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: 10000
      NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: 120000
      NPM_CONFIG_FETCH_TIMEOUT: 300000
    steps:
      - name: Check UPDATE_ALL flag
        id: check-update-all
        run: |
          if [[ "${{ secrets.UPDATE_ALL }}" == "true" ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi
  
      - name: Checkout code
        if: steps.check-update-all.outputs.should_run == 'true'
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GHB_TOKEN }}
      
      - name: Setup Node.js
        if: steps.check-update-all.outputs.should_run == 'true'
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          registry-url: ${{ secrets.REGISTRY_URL }}
      
      - name: Publish All to Registry 2
        if: steps.check-update-all.outputs.should_run == 'true'
        env:
          REGISTRY_2: ${{ secrets.REGISTRY_URL_2 }}
          TOKEN_2: ${{ secrets.NPM_TOKEN_2 }}
        run: |
          retry_with_backoff() {
            local max_attempts="$1"
            local sleep_seconds="$2"
            shift 2
            local attempt=1

            until "$@"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "Command failed after ${max_attempts} attempts: $*"
                return 1
              fi
              echo "Attempt ${attempt}/${max_attempts} failed. Retrying in ${sleep_seconds}s: $*"
              sleep "$sleep_seconds"
              attempt=$((attempt + 1))
              sleep_seconds=$((sleep_seconds * 2))
            done
          }

          if [ -z "$REGISTRY_2" ] || [ -z "$TOKEN_2" ]; then
            echo "Registry 2 secrets not set, skipping."
            exit 0
          fi

          trap 'rm -f .npmrc' EXIT

          REGISTRY_2_NO_PROTO=$(echo "$REGISTRY_2" | sed 's/^https\?:\/\///')
          # 去掉可能存在的尾部斜杠
          REGISTRY_2_NO_PROTO=$(echo "$REGISTRY_2_NO_PROTO" | sed 's/\/$//')

          # 在当前目录生成 .npmrc
          echo "registry=$REGISTRY_2" > .npmrc
          echo "//$REGISTRY_2_NO_PROTO/:_authToken=$TOKEN_2" >> .npmrc

          publish_registry2_one() {
            local dir="$1"
            (
              cd "$dir"
              echo "发布 $dir 到 Registry 2"
              CURRENT_VERSION=$(node -p "require('./package.json').version")
              PACKAGE_NAME=$(node -p "require('./package.json').name")
              echo "当前版本: $CURRENT_VERSION"

              if npm view $PACKAGE_NAME@$CURRENT_VERSION version &> /dev/null; then
                echo "Version $CURRENT_VERSION exists on $REGISTRY_2, unpublishing..."
                retry_with_backoff 3 3 npm unpublish $PACKAGE_NAME@$CURRENT_VERSION --force
                sleep 5
              fi

              retry_with_backoff 5 5 npm publish --access public
            )
          }

          PACKAGE_DIRS=$(find . -name "package.json" -not -path "*/node_modules/*" -not -path "./package.json" -exec dirname {} \; | sed 's/^\.\///')
          echo "Found packages: $PACKAGE_DIRS"
          # 仅保留一级目录
          FIRST_LEVEL_DIRS=()
          for dir in $PACKAGE_DIRS; do
            if [[ "$dir" != *"/"* ]]; then
              FIRST_LEVEL_DIRS+=("$dir")
            fi
          done
          
          echo "要发布的一级目录包: ${FIRST_LEVEL_DIRS[*]}"
          
          for dir in "${FIRST_LEVEL_DIRS[@]}"; do
            if [ ! -d "$dir" ]; then
              echo "目录 $dir 不存在，跳过..."
              continue
            fi
            publish_registry2_one "$dir"
          done

      - name: Notify cache bump for Registry 2
        if: steps.check-update-all.outputs.should_run == 'true'
        env:
          NOTIFY_URL: ${{ secrets.NOTIFY_URL_2 }}
          NOTIFY_TOKEN: ${{ secrets.NOTIFY_TOKEN_2 }}
        run: |
          if [ -z "$NOTIFY_URL" ] || [ -z "$NOTIFY_TOKEN" ]; then
            echo "NOTIFY_URL_2 or NOTIFY_TOKEN_2 not set, skipping."
            exit 0
          fi
          echo "Sending POST request to $NOTIFY_URL"
          set +e
          HTTP_STATUS=$(curl -s -o /tmp/notify_response_2.txt -w "%{http_code}" --max-time 30 \
            -X POST "$NOTIFY_URL" \
            -H "Authorization: Bearer $NOTIFY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{}')
          CURL_EXIT=$?
          set -e
          if [ "$CURL_EXIT" -ne 0 ]; then
            echo "::warning::Notification (Registry 2) request failed (curl exit code $CURL_EXIT)"
          elif [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "Notification (Registry 2) sent successfully (HTTP $HTTP_STATUS)"
          else
            echo "::warning::Notification (Registry 2) failed with HTTP status $HTTP_STATUS"
            cat /tmp/notify_response_2.txt || true
          fi

      - name: Publish All to Default Registry
        if: steps.check-update-all.outputs.should_run == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_FETCH_RETRIES: 8
          NPM_CONFIG_FETCH_RETRY_MINTIMEOUT: 20000
          NPM_CONFIG_FETCH_RETRY_MAXTIMEOUT: 300000
          NPM_CONFIG_FETCH_TIMEOUT: 600000
        run: |
          retry_with_backoff() {
            local max_attempts="$1"
            local sleep_seconds="$2"
            shift 2
            local attempt=1

            until "$@"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "Command failed after ${max_attempts} attempts: $*"
                return 1
              fi
              echo "Attempt ${attempt}/${max_attempts} failed. Retrying in ${sleep_seconds}s: $*"
              sleep "$sleep_seconds"
              attempt=$((attempt + 1))
              sleep_seconds=$((sleep_seconds * 2))
            done
          }

          retry_publish_with_timeout() {
            # 单次 publish 最多跑 20 分钟，避免网络卡死导致步骤长期阻塞。
            timeout 20m npm publish --access public
          }

          # 确保清理掉可能残留的 .npmrc
          rm -f .npmrc

          publish_default_one() {
            local dir="$1"
            (
              cd "$dir"
              echo "发布 $dir 到默认 Registry"
              CURRENT_VERSION=$(node -p "require('./package.json').version")
              PACKAGE_NAME=$(node -p "require('./package.json').name")
              echo "当前版本: $CURRENT_VERSION"

              if npm view $PACKAGE_NAME@$CURRENT_VERSION version &> /dev/null; then
                echo "版本 $CURRENT_VERSION 已存在，尝试取消发布..."
                retry_with_backoff 3 3 npm unpublish $PACKAGE_NAME@$CURRENT_VERSION --force
                sleep 5
              fi

              retry_with_backoff 8 10 retry_publish_with_timeout
            )
          }

          PACKAGE_DIRS=$(find . -name "package.json" -not -path "*/node_modules/*" -not -path "./package.json" -exec dirname {} \; | sed 's/^\.\///')
          echo "Found packages: $PACKAGE_DIRS"
          # 仅保留一级目录
          FIRST_LEVEL_DIRS=()
          for dir in $PACKAGE_DIRS; do
            if [[ "$dir" != *"/"* ]]; then
              FIRST_LEVEL_DIRS+=("$dir")
            fi
          done
          
          echo "要发布的一级目录包: ${FIRST_LEVEL_DIRS[*]}"
          
          for dir in "${FIRST_LEVEL_DIRS[@]}"; do
            if [ ! -d "$dir" ]; then
              echo "目录 $dir 不存在，跳过..."
              continue
            fi
            publish_default_one "$dir"
          done

      - name: Notify cache bump
        if: steps.check-update-all.outputs.should_run == 'true'
        env:
          NOTIFY_URL: ${{ secrets.NOTIFY_URL }}
          NOTIFY_TOKEN: ${{ secrets.NOTIFY_TOKEN }}
        run: |
          if [ -z "$NOTIFY_URL" ] || [ -z "$NOTIFY_TOKEN" ]; then
            echo "NOTIFY_URL or NOTIFY_TOKEN not set, skipping."
            exit 0
          fi
          echo "Sending POST request to $NOTIFY_URL"
          set +e
          HTTP_STATUS=$(curl -s -o /tmp/notify_response.txt -w "%{http_code}" --max-time 30 \
            -X POST "$NOTIFY_URL" \
            -H "Authorization: Bearer $NOTIFY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{}')
          CURL_EXIT=$?
          set -e
          if [ "$CURL_EXIT" -ne 0 ]; then
            echo "::warning::Notification request failed (curl exit code $CURL_EXIT)"
          elif [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "Notification sent successfully (HTTP $HTTP_STATUS)"
          else
            echo "::warning::Notification failed with HTTP status $HTTP_STATUS"
            cat /tmp/notify_response.txt || true
          fi
  
  upload-changes-img:
    needs: detect-changes
    if: ${{ github.event_name == 'push' && needs.detect-changes.outputs.matrix != '{"package":[]}' && github.ref == 'refs/heads/deploy' }}
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Check UPDATE_ALL_IMG flag
        id: check-update-all-img
        run: |
          if [[ "${{ secrets.UPDATE_ALL_IMG }}" == "true" ]]; then
            echo "should_skip=true" >> $GITHUB_OUTPUT
          else
            echo "should_skip=false" >> $GITHUB_OUTPUT
          fi

      - name: echo matrix
        if: steps.check-update-all-img.outputs.should_skip != 'true'
        run: echo "${{ toJson(matrix) }}"
      
      - name: Checkout code
        if: steps.check-update-all-img.outputs.should_skip != 'true'
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GHB_TOKEN }}
      
      - name: upload
        if: steps.check-update-all-img.outputs.should_skip != 'true'
        run: |
          cd ${{ matrix.package }}

          # 找到所有WebP图片文件
          echo "找到以下WebP图片文件："
          find . -type f -name "*.webp" -not -path "*/node_modules/*" -not -path "*/\.*/*"

          # 创建临时目录用于整理图片，保留父目录结构
          mkdir -p ../temp_images/${{ matrix.package }}

          # 遍历所有WebP图片并保持相对路径结构复制到临时目录
          find . -type f -name "*.webp" -not -path "*/node_modules/*" -not -path "*/\.*/*" | while read file; do
            # 保持相对路径结构
            relative_path="${file#./}"
            target_dir="../temp_images/${{ matrix.package }}/$(dirname "$relative_path")"
            mkdir -p "$target_dir"
            cp "$file" "$target_dir/"
            echo "复制 $file 到 $target_dir/$(basename "$file")"
          done

          # 检查是否有找到图片
          if [ -z "$(find ../temp_images/${{ matrix.package }} -name "*.webp" 2>/dev/null)" ]; then
            echo "没有找到任何WebP图片"
            exit 0
          fi

      - name: Determine R2 Destination
        id: r2_dest
        run: |
          if [ -z "${{ secrets.R2_IMG_TARGET }}" ]; then
            echo "path=${{ matrix.package }}" >> $GITHUB_OUTPUT
          else
            echo "path=${{ secrets.R2_IMG_TARGET }}/${{ matrix.package }}" >> $GITHUB_OUTPUT
          fi
      
      - name: 使用SCP上传WebP图片 (尝试 1/3)
        id: upload_img_try_1
        if: steps.check-update-all-img.outputs.should_skip != 'true'
        continue-on-error: true
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          source: "temp_images/${{ matrix.package }}/*"
          target: "${{ secrets.IMG_TARGET }}"
          strip_components: 1
          rm: false
          timeout: 180s
          command_timeout: 15m

      - name: 等待后重试SCP上传 (尝试 2/3)
        if: steps.check-update-all-img.outputs.should_skip != 'true' && steps.upload_img_try_1.outcome == 'failure'
        run: sleep 10

      - name: 使用SCP上传WebP图片 (尝试 2/3)
        id: upload_img_try_2
        if: steps.check-update-all-img.outputs.should_skip != 'true' && steps.upload_img_try_1.outcome == 'failure'
        continue-on-error: true
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          source: "temp_images/${{ matrix.package }}/*"
          target: "${{ secrets.IMG_TARGET }}"
          strip_components: 1
          rm: false
          timeout: 180s
          command_timeout: 15m

      - name: 等待后重试SCP上传 (尝试 3/3)
        if: steps.check-update-all-img.outputs.should_skip != 'true' && steps.upload_img_try_1.outcome == 'failure' && steps.upload_img_try_2.outcome == 'failure'
        run: sleep 20

      - name: 使用SCP上传WebP图片 (尝试 3/3)
        id: upload_img_try_3
        if: steps.check-update-all-img.outputs.should_skip != 'true' && steps.upload_img_try_1.outcome == 'failure' && steps.upload_img_try_2.outcome == 'failure'
        continue-on-error: true
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          source: "temp_images/${{ matrix.package }}/*"
          target: "${{ secrets.IMG_TARGET }}"
          strip_components: 1
          rm: false
          timeout: 180s
          command_timeout: 15m

      - name: SCP上传失败并终止
